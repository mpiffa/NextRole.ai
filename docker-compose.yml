# docker-compose.yml
version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nextrole_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: nextrole_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    tty: true 

  database:
    image: postgres:18-alpine
    container_name: nextrole_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: